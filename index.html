<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قريباً</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@200;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Kufi Arabic', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at top, #0a2e22 0%, #051a14 60%, #020806 100%);
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* نجوم متلألئة في الخلفية */
        .stars {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1.5px 1.5px at 70% 20%, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 85% 50%, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 15% 80%, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1.5px 1.5px at 90% 10%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.4), transparent);
            background-size: 100% 100%;
            animation: twinkle 4s ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        /* اللوحة الإعلانية */
        .billboard {
            position: relative;
            background: linear-gradient(145deg, #0e3a2c 0%, #061f17 100%);
            border-radius: 24px;
            padding: 80px 50px;
            box-shadow:
                0 30px 80px rgba(0,0,0,0.7),
                0 0 0 2px rgba(196,150,44,0.15),
                inset 0 0 0 1px rgba(255,255,255,0.05);
            max-width: 720px;
            width: 100%;
            text-align: center;
            z-index: 2;
            overflow: hidden;
        }

        /* إطار معدني للوحة */
        .billboard::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(196,150,44,0.25);
            border-radius: 18px;
            pointer-events: none;
        }

        /* وهج ذهبي خفيف */
        .billboard::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(196,150,44,0.08) 0%, transparent 40%);
            animation: glow 6s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes glow {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(10%, 10%) rotate(180deg); }
        }

        /* الأعمدة الجانبية */
        .pillars {
            position: absolute;
            bottom: -100px;
            left: 50px;
            width: 30px;
            height: 120px;
            background: linear-gradient(to right, #1a1a1a, #3a3a3a, #1a1a1a);
            border-radius: 0 0 8px 8px;
            z-index: 1;
        }
        .pillars.right { left: auto; right: 50px; }

        /* المحتوى */
        .content { position: relative; z-index: 3; }

        .icon-wrap {
            width: 90px;
            height: 90px;
            margin: 0 auto 30px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(196,150,44,0.2), rgba(196,150,44,0.05));
            border: 1px solid rgba(196,150,44,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: pulse 2.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(196,150,44,0.4); }
            50% { box-shadow: 0 0 0 20px rgba(196,150,44,0); }
        }
        .icon-wrap i {
            font-size: 2.5rem;
            color: #C4962C;
            animation: rotate 8s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .label {
            display: inline-block;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: rgba(196,150,44,0.7);
            margin-bottom: 20px;
            font-weight: 600;
            padding: 6px 20px;
            border: 1px solid rgba(196,150,44,0.3);
            border-radius: 50px;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 40px;
            text-shadow: 0 4px 30px rgba(196,150,44,0.3);
            background: linear-gradient(180deg, #ffffff 0%, #C4962C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* نقاط تحميل */
        .loader {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 40px;
        }
        .loader span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #C4962C;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .loader span:nth-child(2) { animation-delay: 0.2s; }
        .loader span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* زخرفة سفلية */
        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 30px;
            opacity: 0.5;
        }
        .ornament::before, .ornament::after {
            content: '';
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #C4962C, transparent);
        }
        .ornament i {
            color: #C4962C;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="billboard">
        <div class="pillars"></div>
        <div class="pillars right"></div>

        <div class="content">
            <div class="icon-wrap">
                <i class="fas fa-heart-pulse"></i>
            </div>

            <span class="label">Coming Soon</span>

            <h1>قريباً</h1>

            <div class="loader">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="ornament">
                <i class="fas fa-star"></i>
            </div>
        </div>
    </div>
</body>
</html>
